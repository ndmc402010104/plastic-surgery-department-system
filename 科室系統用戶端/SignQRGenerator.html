<!DOCTYPE html>
<html>

<head>

<base target="_top">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
  font-family:Arial,"Noto Sans TC","Microsoft JhengHei",sans-serif;
  color:#172033;
  background:
    radial-gradient(circle at top left,rgba(37,99,235,.1),transparent 30rem),
    linear-gradient(180deg,#fbfdff 0%,#f4f7fb 100%);
  padding:96px 24px 82px;
  margin:0;
}

.wrap{
  max-width:980px;
  margin:0 auto;
}

.appHeader{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:20;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:18px;
  height:76px;
  margin:0;
  padding:0 max(24px,calc((100vw - 980px) / 2 + 24px));
  box-sizing:border-box;
  border-bottom:1px solid #dbe4ef;
  background:rgba(248,251,255,.92);
  backdrop-filter:blur(10px);
  box-shadow:0 8px 24px rgba(15,23,42,.06);
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
  cursor:pointer;
}

.brandMark{
  width:46px;
  height:46px;
  display:grid;
  place-items:center;
  border-radius:14px;
  color:#ffffff;
  font-size:22px;
  font-weight:800;
  background:linear-gradient(135deg,#2563eb,#0f766e);
  box-shadow:0 12px 24px rgba(37,99,235,.2);
}

.brandText{
  display:grid;
  gap:2px;
}

.brandName{
  font-size:18px;
  font-weight:800;
}

.brandSub{
  color:#64748b;
  font-size:13px;
}

.pageHero{
  margin-bottom:24px;
}

.pageMap{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:24px;
  color:#64748b;
  font-size:13px;
  font-weight:700;
}

.pageMapLink{
  border:0;
  padding:0;
  background:transparent;
  color:#2563eb;
  font:inherit;
  cursor:pointer;
}

.pageMapCurrent{
  color:#172033;
}

.pageMapSep{
  color:#94a3b8;
}

.eyebrow{
  margin:0 0 10px;
  color:#1d4ed8;
  font-size:13px;
  font-weight:800;
}

h2{
  margin:0;
  font-size:clamp(28px,4vw,42px);
  line-height:1.18;
  letter-spacing:0;
}

.pageLead{
  margin:12px 0 0;
  color:#475569;
  font-size:16px;
  line-height:1.7;
}

.homeBtn{
  width:auto;
  padding:12px 22px;
  font-size:16px;
  border-radius:8px;
  border:1px solid #d6dde7;
  background:#eef2f7;
  color:#334155;
  cursor:pointer;
}

#course{
  width:100%;
  min-height:58px;
  padding:0 56px 0 18px;
  border-radius:8px;
  border:1px solid #d6dde7;
  font-size:18px;
  line-height:1.4;
  background:white;
  box-sizing:border-box;
}

#course option{
  font-size:16px;
}

.optionRow{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:18px;
  margin:20px 0;
}

.optionRow input{
  width:22px;
  height:22px;
}

.mainBtn{
  width:100%;
  padding:18px;
  font-size:22px;
  font-weight:700;
  border-radius:8px;
  border:1px solid #d6dde7;
  background:white;
  cursor:pointer;
}

.mainBtn:hover,
.homeBtn:hover{
  background:#f8fafc;
}

#result{
  margin-top:30px;
  text-align:center;
}

#result img{
  width:400px;
  max-width:95%;
  cursor:pointer;
}

@media(max-width:640px){

  body{
    padding:92px 16px 72px;
  }

  .appHeader{
    align-items:flex-start;
    justify-content:center;
    height:76px;
    padding:0 16px;
  }

  h2{
    font-size:24px;
  }

  #course{
    font-size:16px;
    min-height:54px;
  }

}

</style>

<script>

  const APP_ENTRY_URL =
    '<?= appEntryUrl ?>';

  function goHome(){

    window.top.location.href =
      APP_ENTRY_URL;

  }

  function makeSignQR(){

    const meeting =
      getSelectedMeeting();

    const signUrl =
      buildSignQRUrl(
        meeting
      );

    const qrUrl =
      buildQRCodeImageUrl(
        signUrl
      );

    renderSignQR(
      signUrl,
      qrUrl
    );

    const enablePopup =
      document
        .getElementById('popupQR')
        .checked;

    if(enablePopup){

      openSignQRPopup(
        signUrl,
        qrUrl
      );

    }

  }

  function getSelectedMeeting(){

    const raw =
      decodeURIComponent(
        document
          .getElementById('course')
          .value
      );

    const parts =
      raw.split('||');

    return {
      course: parts[0],
      date: parts[1],
      token: parts[2]
    };

  }

  function buildSignQRUrl(meeting){

    return (
      APP_ENTRY_URL +
      '?page=signmeeting' +
      '&course=' +
      encodeURIComponent(meeting.course) +
      '&date=' +
      encodeURIComponent(meeting.date) +
      '&token=' +
      encodeURIComponent(meeting.token) +
      '&v=' +
      Date.now()
    );

  }

  function buildQRCodeImageUrl(signUrl){

    return (
      'https://api.qrserver.com/v1/create-qr-code/?size=1000x1000&margin=30&data=' +
      encodeURIComponent(signUrl)
    );

  }

  function renderSignQR(signUrl,qrUrl){

    document
      .getElementById('result')
      .innerHTML =
        '<h3>請掃描簽到</h3>' +
        '<a href="' + signUrl + '" target="_blank">' +
        '<img src="' + qrUrl + '">' +
        '</a>';

  }

  function openSignQRPopup(signUrl,qrUrl){

    const popup =
      window.open(
        '',
        '_blank'
      );

    if(!popup){

      alert(
        '瀏覽器阻擋了新分頁，請允許彈出視窗。'
      );

      return;

    }

    popup.document.write(
      '<html>' +
      '<head>' +
      '<title>簽到 QR</title>' +
      '<style>' +
      'body{margin:0;display:flex;justify-content:center;align-items:center;height:100vh;background:white;}' +
      'img{max-width:95vw;max-height:95vh;cursor:pointer;}' +
      '</style>' +
      '</head>' +
      '<body>' +
      '<a href="' + signUrl + '" target="_blank">' +
      '<img src="' + qrUrl + '">' +
      '</a>' +
      '</body>' +
      '</html>'
    );

    popup.document.close();

  }

</script>

</head>

<body>

<div class="wrap">

  <header class="appHeader">

    <div class="brand" onclick="goHome()">
      <div class="brandMark">S</div>
      <div class="brandText">
        <span class="brandName">新光整形外科科室系統</span>
        <span class="brandSub">簽到 QR 產生器</span>
      </div>
    </div>

  </header>

  <nav class="pageMap" aria-label="頁面地圖">
    <button class="pageMapLink" onclick="goHome()">首頁</button>
    <span class="pageMapSep">/</span>
    <span class="pageMapCurrent">簽到 QR 產生器</span>
  </nav>

  <section class="pageHero">
    <p class="eyebrow">簽到工具</p>
    <h2>會議簽到 QR</h2>
    <p class="pageLead">選擇會議後產生簽到連結與 QR Code，供現場投影或列印使用。</p>
  </section>

  <select id="course">
    <?!= options ?>
  </select>

  <label class="optionRow">

    <input
      type="checkbox"
      id="popupQR"
      checked
    >

    自動彈出全螢幕 QR

  </label>

  <button
    class="mainBtn"
    onclick="makeSignQR()"
  >
    產生 QR
  </button>

  <div id="result"></div>

</div>

<?!= getVersionBadgeHtml({showCalendarSource:true}) ?>

</body>

</html>
