<!DOCTYPE html>
<html>

<head>
<base target="_top">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{
  font-family:Arial,"Noto Sans TC","Microsoft JhengHei",sans-serif;
  color:#172033;
  background:
    radial-gradient(circle at top left,rgba(37,99,235,.1),transparent 30rem),
    linear-gradient(180deg,#fbfdff 0%,#f4f7fb 100%);
  margin:0;
  padding:96px 24px 82px;
}

.shell{
  width:min(980px,100%);
  margin:0 auto;
}

.appHeader{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:20;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:18px;
  height:76px;
  margin:0;
  padding:0 max(24px,calc((100vw - 980px) / 2 + 24px));
  box-sizing:border-box;
  border-bottom:1px solid #dbe4ef;
  background:rgba(248,251,255,.92);
  backdrop-filter:blur(10px);
  box-shadow:0 8px 24px rgba(15,23,42,.06);
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
  cursor:pointer;
}

.brandMark{
  width:46px;
  height:46px;
  display:grid;
  place-items:center;
  border-radius:14px;
  color:#ffffff;
  font-size:22px;
  font-weight:800;
  background:linear-gradient(135deg,#2563eb,#0f766e);
  box-shadow:0 12px 24px rgba(37,99,235,.2);
}

.brandText{
  display:grid;
  gap:2px;
}

.brandName{
  font-size:18px;
  font-weight:800;
}

.brandSub{
  color:#64748b;
  font-size:13px;
}

.pageHero{
  margin-bottom:24px;
}

.pageMap{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:24px;
  color:#64748b;
  font-size:13px;
  font-weight:700;
}

.pageMapLink{
  border:0;
  padding:0;
  background:transparent;
  color:#2563eb;
  font:inherit;
  cursor:pointer;
}

.pageMapCurrent{
  color:#172033;
}

.pageMapSep{
  color:#94a3b8;
}

.eyebrow{
  margin:0 0 10px;
  color:#1d4ed8;
  font-size:13px;
  font-weight:800;
}

h1{
  margin:0;
  font-size:clamp(28px,4vw,42px);
  line-height:1.18;
  letter-spacing:0;
}

.pageLead{
  margin:12px 0 0;
  color:#475569;
  font-size:16px;
  line-height:1.7;
}

.homeBtn{
  width:auto;
  padding:12px 22px;
  border-radius:8px;
  border:1px solid #d6dde7;
  background:#eef2f7;
  color:#334155;
  font-size:16px;
  cursor:pointer;
}

.section{
  background:white;
  border:1px solid #dbe4ef;
  border-radius:8px;
  padding:28px;
  margin-bottom:22px;
  box-shadow:0 8px 24px rgba(15,23,42,.06);
}

h2{
  margin-top:0;
  font-size:24px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:14px;
}

.loginBtn{
  padding:18px;
  border-radius:8px;
  border:1px solid #dbe4ff;
  background:#eef2ff;
  color:#1e293b;
  font-size:20px;
  font-weight:700;
  cursor:pointer;
}

.loginBtn:hover{
  background:#e3eaff;
}

.extraBtn{
  background:#ecfdf5;
  border-color:#bbf7d0;
}

.extraBtn:hover{
  background:#dcfce7;
}

.manualRow{
  display:flex;
  gap:12px;
}

.manualRow input{
  flex:1;
  padding:16px;
  border-radius:8px;
  border:1px solid #cbd5e1;
  font-size:20px;
}

.manualRow button{
  width:160px;
}

@media(max-width:640px){
  body{
    padding:92px 16px 72px;
  }

  .appHeader{
    align-items:flex-start;
    justify-content:center;
    height:76px;
    padding:0 16px;
  }

  .manualRow{
    flex-direction:column;
  }

  .manualRow button{
    width:100%;
  }
}
</style>

<script>
const APP_ENTRY_URL =
  '<?= appEntryUrl ?>';

const staffList =
  JSON.parse(
    '<?!= staffList ?>'
  );

const extraList =
  JSON.parse(
    '<?!= extraList ?>'
  );

function goHome(){

  window.top.location.href =
    APP_ENTRY_URL;

}

function log(account,password){

  document
    .getElementById('accountId')
    .value =
    account;

  document
    .getElementById('passwordId')
    .value =
    password || '';

  document
    .getElementById('subBtn')
    .click();

}

function manualLogin(){

  const account =
    document
      .getElementById('manualAccount')
      .value
      .trim();

  if(!account){
    alert('請輸入員工編號');
    return;
  }

  log(account,'');

}

function renderStaff(){

  const vsBox =
    document.getElementById('vsBox');

  const residentBox =
    document.getElementById('residentBox');

  staffList.forEach(function(person){

    if(person.name === '吳明娟'){
      return;
    }

    const btn =
      document.createElement('button');

    btn.className =
      'loginBtn';

    btn.textContent =

      (
        person.role || ''
      )

      +

      ' '

      +

      person.name;

    btn.onclick =
      function(){

        log(
          person.emp,
          ''
        );

      };

    if(
      person.role === 'VS' ||
      person.role === 'F' ||
      person.role === 'Fellow'
    ){
      vsBox.appendChild(btn);
    }else{
      residentBox.appendChild(btn);
    }

  });

}

function renderExtra(){

  const extraBox =
    document.getElementById('extraBox');

  extraList.forEach(function(person){

    const btn =
      document.createElement('button');

    btn.className =
      'loginBtn extraBtn';

    btn.textContent =
      person.title +
      ' ' +
      person.name;

    btn.onclick =
      function(){

        log(
          person.emp,
          ''
        );

      };

    extraBox.appendChild(btn);

  });

}

function initPage(){

  renderStaff();
  renderExtra();

}

window.addEventListener(
  'DOMContentLoaded',
  initPage
);
</script>

</head>

<body>

<header class="appHeader">

    <div class="brandMark">S</div>
    <div class="brandText">
      <span class="brandName">新光整形外科科室系統</span>
      <span class="brandSub">院內系統快速登入</span>
    </div>
  </div>

</header>

<nav class="pageMap" aria-label="頁面地圖">
  <button class="pageMapLink" onclick="goHome()">首頁</button>
  <span class="pageMapSep">/</span>
  <span class="pageMapCurrent">院內系統快速登入</span>
</nav>

<section class="pageHero">
  <p class="eyebrow">院內作業</p>
  <h1>院內系統快速登入</h1>
  <p class="pageLead">選擇人員或手動輸入員工編號，快速開啟院內系統登入流程。</p>
</section>

<div class="section">
  <h2>主治醫師</h2>
  <div
    id="vsBox"
    class="grid"
  ></div>
</div>

<div class="section">
  <h2>住院醫師&NP</h2>
  <div
    id="residentBox"

  ></div>
</div>

<div class="section">
  <h2>行政登入</h2>
  <div
    id="extraBox"

  ></div>
</div>

<div class="section">

  <div class="manualRow">
    <input
      id="manualAccount"
      type="text"
      placeholder="請輸入員工編號"
      onkeydown="if(event.key==='Enter'){manualLogin();}"

    <button

      onclick="manualLogin()"

      登入

</div>

  <input name="_AUTOWEB_QUERYTABLE_" value="TRUE">
  <input name="uri" value="https://prod-eipn.skh.org.tw/EIP_MyPage.aspx">

</main>
