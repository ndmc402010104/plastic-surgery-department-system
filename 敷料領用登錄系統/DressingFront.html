<script>
let APP_ENTRY_URL = '<?= appEntryUrl ?>';

if (APP_ENTRY_URL.includes('<' + '?=') || APP_ENTRY_URL.trim() === '') {
  APP_ENTRY_URL = 'https://script.google.com/macros/s/AKfycbwbz8pXfU68j2aFeF_AaDmmG6Vco3JsPSw-PGyYeLu0AF3vCfzaZJQFOjORnwSw8Xp4/exec';
}

let AJAX_MODULE_STATE = {
  current:'',
  dictLoadedOnce:false
};

function goHome(){
  window.top.location.href = APP_ENTRY_URL;
}

async function showModule(name){
  document.querySelectorAll('.moduleArea').forEach(function(el){
    el.style.display = 'none';
  });

  document.querySelectorAll('.moduleTab').forEach(function(btn){
    btn.classList.remove('active');
  });

  const target = document.getElementById(name + 'Area');
  const btn = document.querySelector('[data-module-button="' + name + '"]');

  if(btn){
    btn.classList.add('active');
  }

  if(target){
    target.style.display = 'block';
  }

  AJAX_MODULE_STATE.current = name;

  if(name === 'dict' && typeof loadDictList === 'function'){
    if(!AJAX_MODULE_STATE.dictLoadedOnce){
      AJAX_MODULE_STATE.dictLoadedOnce = true;
      await loadDictList();
    }
  }
}

function reloadCurrentModule(){
  if(AJAX_MODULE_STATE.current === 'dict' && typeof loadDictList === 'function'){
    return loadDictList();
  }
}
</script>
